trigger:
  - main

# Replace the placeholder values below with your Azure configuration before running the pipeline.
variables:
  webAppName: '<your-web-app-name>'
  resourceGroup: '<your-resource-group>'
  azureServiceConnection: '<your-azure-service-connection>'

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            displayName: Use Python 3.10
            inputs:
              versionSpec: '3.10'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: Install dependencies

          - task: ArchiveFiles@2
            displayName: Zip project artifact
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
              includeRootFolder: false
              archiveType: zip
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: Publish artifact
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
              ArtifactName: drop

  - stage: Deploy
    displayName: Deploy to Azure App Service
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: Deploy
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: DownloadBuildArtifacts@1
            displayName: Download artifact
            inputs:
              buildType: current
              downloadType: single
              artifactName: drop
              downloadPath: '$(System.ArtifactsDirectory)'

          - task: AzureWebApp@1
            displayName: Deploy to Azure App Service
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: webAppLinux
              appName: '$(webAppName)'
              resourceGroupName: '$(resourceGroup)'
              package: '$(System.ArtifactsDirectory)/drop/app.zip'
              startUpCommand: 'gunicorn app:app'
